<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>D3.js Force-Directed Network</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                /* Hide scrollbars */
                font-family: "Open Sans", sans-serif;
                background-color: #f5f5dc;
            }

            svg {
                display: block;
            }

            .link {
                stroke: #999;
            }
        </style>
    </head>

    <body>
        <svg></svg>
        <script>
            const svg = d3.select("svg");

            d3.json("graph_data_k3.json").then(function (graph) {
                const nodesData = graph.nodes;
                const linksData = graph.links;

                const width = window.innerWidth;
                const height = window.innerHeight;

                svg.attr("width", width).attr("height", height);

                const offsetX = width / 2;
                const offsetY = height / 2;

                const scaler = 600;

                nodesData.forEach((node) => {
                    node.pos[0] = node.pos[0] * scaler + offsetX;
                    node.pos[1] = node.pos[1] * scaler + offsetY;
                    node.originalPos = [node.pos[0], node.pos[1]];
                });

                function attractTowardsOriginalPosition(alpha) {
                    const strength = 0.2; // attraction strength scaler
                    nodesData.forEach((node) => {
                        const targetX = node.originalPos[0];
                        const targetY = node.originalPos[1];
                        node.vx += (targetX - node.x) * alpha * strength;
                        node.vy += (targetY - node.y) * alpha * strength;
                    });
                }

                function repel(alpha) {
                    const strength = 0.05; // repulsion strength scaler
                    nodesData.forEach((node) => {
                        nodesData.forEach((otherNode) => {
                            if (node !== otherNode) {
                                const dx = node.x - otherNode.x;
                                const dy = node.y - otherNode.y;
                                const distance = Math.sqrt(dx * dx + dy * dy);
                                const forceX = (dx / distance) * strength;
                                const forceY = (dy / distance) * strength;
                                node.vx += forceX * alpha;
                                node.vy += forceY * alpha;
                            }
                        });
                    });
                }

                const simulation = d3
                    .forceSimulation(nodesData)
                    .force("charge", d3.forceManyBody().strength(-10))
                    .force("center", d3.forceCenter(offsetX, offsetY))
                    .force(
                        "link",
                        d3
                            .forceLink(linksData)
                            .id((d) => d.id)
                            .strength((d) => d.weight * 0.2),
                    )
                    .force("collision", d3.forceCollide().radius(15))
                    .force("attract", attractTowardsOriginalPosition)
                    .force("repel", repel)
                    .on("tick", ticked);

                const links = svg
                    .selectAll(".link")
                    .data(linksData)
                    .enter()
                    .append("line")
                    .attr("class", "link")
                    .style("stroke-width", (d) => Math.sqrt(d.weight * 5))
                    // .style("stroke-opacity", (d) => 0.2 + d.weight * 0.8)
                    .attr("fill", "red");

                const nodes = svg
                    .selectAll(".node")
                    .data(nodesData)
                    .enter()
                    .append("circle")
                    .attr("class", "node")
                    .attr("r", 10)
                    .attr("fill", (d) => d.color)
                    .call(
                        d3
                            .drag() // Enable dragging behavior
                            .on("start", dragStarted)
                            .on("drag", dragged)
                            .on("end", dragEnded),
                    );

                const labels = svg
                    .selectAll(".nodeLabel")
                    .data(nodesData)
                    .enter()
                    .append("text")
                    .attr("class", "nodeLabel")
                    .text((d) => d.title)
                    .attr("dx", 12)
                    .attr("dy", 4)
                    .style("font-size", "7px");

                function ticked() {
                    links
                        .attr("x1", (d) => d.source.x)
                        .attr("y1", (d) => d.source.y)
                        .attr("x2", (d) => d.target.x)
                        .attr("y2", (d) => d.target.y);

                    nodes.attr("cx", (d) => d.x).attr("cy", (d) => d.y);

                    labels.attr("x", (d) => d.x).attr("y", (d) => d.y);
                }

                function dragStarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }

                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }

                function dragEnded(event, d) {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }
            });
        </script>
    </body>
</html>
